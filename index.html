<!DOCTYPE html>
<html>

<head>

    <title>Welcome</title>
    <link rel="icon" href="./Assets/Logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="./Assets/w3.css">

    <style>
        body {
            margin-left: 30px;
            margin-top: 10px;
            margin-right: 30px;
        }
    </style>

    <!-- Get participant IDs passed in from URL -->
    <script src="./Assets/GetPpantIds.js"></script>

    <!-- Exclusion check -->
    <script src="./Assets/ExclusionCheck.js"></script>

    <script>
        function IsEmpty(Obj) {
            for (var Key in Obj) {
                if (Obj.hasOwnProperty(Key))
                    return false;
            }
            return true;
        }

        async function GenSubjectId(PID) {
            var P1 = await fetch('./GenSubjectId.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ PoolId: PID }),
            });
            Result = await P1.json();
            return Result;
        }

        async function LogLanding() {

            // Set PpantIds.PoolId and PpantIds.SubjectId
            var PpantIds = {};
            if (!PoolId && Boolean(SubjectId)) {
                PpantIds.PoolId = null;
                PpantIds.SubjectId = SubjectId;

            } else if (Boolean(PoolId) && Boolean(SubjectId)) {
                PpantIds.PoolId = PoolId;
                PpantIds.SubjectId = SubjectId;

            } else {
                alert("An error has occurred.\n" +
                    "Please report error code #000 " +
                    "to Sophie (sj483@sussex.ac.uk).");
                window.location.replace("./Error.html?PoolId=" +
                    PoolId + "&SubjectId=" + SubjectId + "#");
            }

            // Call LogLanding.php
            var P1 = await fetch('./LogLanding.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(PpantIds)
            });
            Result = await P1.json();
            return Result;
        }

        function OnBodyLoad() {
            // Show form if needed:
            if (GetUserInput) {
                document.getElementById('IdForm').style.visibility = 'visible';
            }

            // Add an event listener:
            InputBox = document.getElementById("Input_ID");
            InputBox.addEventListener("keydown", function (Event) {
                // Number 13 is the "Enter" key on the keyboard
                if (Event.keyCode === 13) {
                    // Cancel the default action, if needed
                    Event.preventDefault();
                    // Submit the form:
                    SubmitForm();
                }
            });
        }

        function SubmitForm() {
            var Input = document.getElementById('Input_ID').value;
            if (Input.length === 24 || (Input.length === 5 && /^[0-9]+$/.test(Input))) {
                PoolId = Input;
                GenSubjectId(PoolId)
                    .then(function (P1) {
                        SubjectId = P1.SubjectId;
                    })
                    .then(function () { P2 = LogLanding(); return P2; })
                    .then(function (P2) {
                        if (Boolean(P2.TargetUrl)) {
                            window.location.replace(P2.TargetUrl);
                        } else {
                            alert("An error has occurred.\n" +
                                "Please report error code #001 " +
                                "to Sophie (sj483@sussex.ac.uk).");
                            window.location.replace("./Error.html?PoolId=" +
                                PoolId + "&SubjectId=" + SubjectId + "#");
                        }
                    });
                return;

            } else if (Input.length === 8) {
                SubjectId = Input;
                PoolId = null;
                LogLanding()
                    .then(function (P2) {
                        if (Boolean(P2.TargetUrl)) {
                            window.location.replace(P2.TargetUrl);
                        } else {
                            alert("An error has occurred.\n" +
                                "Please report error code #002 " +
                                "to Sophie (sj483@sussex.ac.uk).");
                            window.location.replace("./Error.html?PoolId=" +
                                PoolId + "&SubjectId=" + SubjectId + "#");
                        }
                    });
                return;
            } else {
                alert("Please enter a valid subjectId.");
            }
        }

        // --- Execute functions ---
        var GetUserInput = false;
        if ((!PoolId) && (!SubjectId)) {
            // Get user input
            GetUserInput = true;

        } else {
            // Call GenSubjectId, no user input required, and then redirect:
            if (!PoolId && Boolean(SubjectId)) {
                LogLanding().then(function (P1) {
                    if (Boolean(P1.TargetUrl)) {
                        window.location.replace(P1.TargetUrl);
                    } else {
                        alert("An error has occurred.\n" +
                            "Please report error code #003 " +
                            "to Sophie (sj483@sussex.ac.uk).");
                        window.location.replace("./Error.html?PoolId=" +
                            PoolId + "&SubjectId=" + SubjectId + "#");
                    }
                });
            } else {
                GenSubjectId(PoolId)
                    .then(function (P1) {
                        SubjectId = P1.SubjectId;
                    })
                    .then(function () { P2 = LogLanding(); return P2; })
                    .then(function (P2) {
                        if (Boolean(P2.TargetUrl)) {
                            window.location.replace(P2.TargetUrl);
                        } else {
                            alert("An error has occurred.\n" +
                                "Please report error code #004 " +
                                "to Sophie (sj483@sussex.ac.uk).");
                            window.location.replace("./Error.html?PoolId=" +
                                PoolId + "&SubjectId=" + SubjectId + "#");
                        }
                    });
            }

        }
    </script>

</head>

<body onload="OnBodyLoad()">
    <!-- BODY -->
    <div class="w3-container" style="width:700px;visibility:hidden" id="IdForm">
        <h1>Sign in</h1>
        <p>Please enter your participant ID in the box below.</p>
        <p>If you have arrived at this page via Prolific, this will be your Prolific ID.</p>
        <p>If you have arrived at this page via SONA, this will be your SONA Unique ID.</p>
        <form>
            <table class="w3-table">
                <tbody>
                    <tr>
                        <td width="280px"><input id="Input_ID" type="text" name="ID" placeholder="Participation ID"
                                size="26"></td>
                    </tr>
                    <tr>
                        <td width="280px"><button type="button" onclick="SubmitForm()">Submit</button></td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</body>

</html>
