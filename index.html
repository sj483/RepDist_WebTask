<html>
<head>

<!-- Get jQuery -->
<script src="./Assets/jquery.min.js"></script>

<!-- Get participant IDs passed in from URL -->
<script src="./GetPpantIds.js"></script>

<!-- Exclusion check -->
<script src="./ExclusionCheck.js"></script>

<script>

function IsEmpty(Obj) {
	for(var Key in Obj) {
	if(Obj.hasOwnProperty(Key))
			return false;
	}
	return true;
}


//NEW...
async function GenSubjectId(PID) {
    var P1 = await fetch('./GenSubjectId.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json', 
        },
        body: JSON.stringify({PoolId: PID}),
    });
    result = await P1.json();
    return result;
    }
//


//NEW...
async function LogLanding() {
    var PpantIds = {};
    if (!PoolId && Boolean(SubjectId)) {
        // They have definitely been here before!
        PpantIds.PoolId = null;
        PpantIds.SubjectId = SubjectId;
    } else if (Boolean(PoolId) && Boolean(SubjectId)) {
        // They may or may not have been here before!
        PpantIds.PoolId = PoolId;
        PpantIds.SubjectId = SubjectId;
    } else {
        alert("A error has occured.\nPlease contant Sam: s.berens@sussex.ac.uk");
        alert('error 1')
    }
    if (!IsEmpty(PpantIds)){
    var P1 = await fetch('./IndexActions.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json', 
        },
        body: JSON.stringify({
            FunctionCall: 'LogLanding',
            Args: PpantIds
        })
    });
    result = await P1.json(); //this result has an 'Error' field and a 'TargetUrl' field  
    } else {
        result = { Destination: null };
    }
    return result; //result get used later with window.location.replace (see SubmitForm)
}

function OnBodyLoad() {
    // Show form if needed:
    if (GetUserInput) {
        document.getElementById('IdForm').style.visibility = 'visible';
    }
    
    // Add an event listener:
    InputBox = document.getElementById("Input_SID");
    InputBox.addEventListener("keydown", function(Event) {
        // Number 13 is the "Enter" key on the keyboard
        if (Event.keyCode === 13) {
            // Cancel the default action, if needed
            Event.preventDefault();
            // Submit the form:
            SubmitForm();
        }
    });
}

async function SubmitForm() {
    var A = document.getElementById('Input_SID').value;
    if (A.length > 20 || (A.length ===5 && /^[0-9]+$/.test(A))){
        PoolId = A; //I need to  do gen subjectID?
        await GenSubjectId(PoolId)
            .then(function(P1) {
            SubjectId = P1.SubjectId;})
            .then(function(  ) {P2 = LogLanding(); return P2;})
            .then(function(P2) {
                if (Boolean(P2.TargetUrl)) {
                    window.location.replace(P2.TargetUrl);
                } else {
                    alert('Something has gone wrong logging your subjectId, please contact the researcher (sj483@sussex.ac.uk).')
                    window.location.replace("./Error.html?PoolId="+PoolId+"&SubjectId="+SubjectId+"#");
                }
            })
        
    } else if (A.length === 8 ) {
        SubjectId = A;
        PoolId = null; 
        await LogLanding()
            .then(function(P2){
                if (Boolean(P2.TargetUrl)) {
                    window.location.replace(P2.TargetUrl);
                } else {
                    alert('Something has gone wrong logging your subjectId, please contact the researcher (sj483@sussex.ac.uk).')
                    window.location.replace("./Error.html?PoolId="+PoolId+"&SubjectId="+SubjectId+"#");
                }
            });  
    }
    if (PoolId === null) {
        //this should only get triggered if they press submit but A doesn't meet either condition above
        alert("Please enter a valid subjectId.") 
    } else {
  
            
    }
}

// --- Execute functions ---
var GetUserInput = false;
if ((!PoolId) && (!SubjectId)) {
    // Get user input
    GetUserInput = true;
    
} else {
    // Call GenSubjectId, no user input required, and then redirect:
    if (!PoolId && Boolean(SubjectId)) {
        LogLanding().then(function(P1) {
            if (Boolean(P1.TargetUrl)) {
                window.location.replace(P1.TargetUrl);
            } else {
                alert('error 3 ')
                window.location.replace("./Error.html?PoolId="+PoolId+"&SubjectId="+SubjectId+"#");
            }
        })
    } else {
            GenSubjectId(PoolId)
            .then(function(P1) {
                SubjectId = P1.SubjectId;
            return LogLanding();
            })
            .then(function(P2) {
                if (Boolean(P2.TargetUrl)) {
                    window.location.replace(P2.TargetUrl);
                } else {
                    alert('error 4 ')
                    window.location.replace("./Error.html?PoolId="+PoolId+"&SubjectId="+SubjectId+"#");
                }
            });
    }
    
}
</script>

</head>

<body onload="OnBodyLoad()">

	</tr>
	<tr>
	    <th width="100px" style="text-align:left"></th>
        <td width="280px"><button type="button" onclick="SubmitForm()">Submit</button></td>

</tbody>

</table>
</form>
</div>
