<!DOCTYPE html>
<html>
<head>
<title>Error</title>
<meta charset="UTF-8">

<!-- Set the favicon logo -->
<link rel="icon" href="./Assets/Logo.png" type="image/x-icon" />

<!-- Import the stylesheet -->
<link rel="stylesheet" href="./Assets/w3.css">

<!-- Some more styling -->
<style>
body {padding: 30px 0;}
</style>

<!-- Get participant IDs passed in from URL -->
<script src="./GetPpantIds.js"></script>

<!-- Get DateTime_Start and ClientTimeZone (and add to TaskIO)  -->
<script src="./Assets/SetDateTime.js"></script>

<script>
    OnBodyLoad = function() {
        const params = new URLSearchParams(window.location.search);
        // Extract the value of subjectId and error
        var SubjectId = params.get("SubjectId");
        var ErrorType = params.get("Error");
        document.getElementById("error").innerHTML = ErrorType;
        document.getElementById("subjectId").innerHTML = SubjectId;
    }
</script>
</head>

<body onload = "OnBodyLoad()";>
<center>
<h1>Oops! &#x1f631;</h1>
<p>Something has gone wrong. Please contact the researchers, via either of these addresses </p>
<p>(sj483@sussex.ac.uk, S.Berens@sussex.ac.uk), with the error code and subject ID below:</p>
<p id="error"></p>
<p id="subjectId"></p>
</center>
</body>
</html>
